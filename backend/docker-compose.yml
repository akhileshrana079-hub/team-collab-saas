services:
  app:
    build: .
    container_name: team-collab-api

    ports:
      - "3000:3000"

    env_file:
      - .env

    restart: unless-stopped

  mongo:
    image: mongo:8

    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    restart: unless-stopped

volumes:
  mongo-data: